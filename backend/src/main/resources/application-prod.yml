# 正式环境配置
spring:
  datasource:
    url: jdbc:mysql://mysql:3306/malahot?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai

# 正式环境关闭 mock 短信（需接入真实短信服务后改为 false）
sms:
  mock-enabled: true

# 正式环境关闭 SQL 日志
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# 正式环境关闭 Swagger
knife4j:
  enable: false
springdoc:
  api-docs:
    enabled: false
