# 测试环境配置
spring:
  datasource:
    url: jdbc:mysql://mysql:3306/malahot_test?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai

# 测试环境始终使用 mock 短信
sms:
  mock-enabled: true
  mock-code: "8888"

# 测试环境开启 SQL 日志
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 测试环境开启 Swagger
knife4j:
  enable: true
